server {
    listen 80;
    listen [::]:80;
    
    # Railway puts your Vite build output into the /app/dist folder!
    root /app/dist; 
    index index.html;

    location / {
        # THE MAGIC LINE: Fallback to index.html if the path isn't a real file
        try_files $uri $uri/ /index.html;
    }
}
